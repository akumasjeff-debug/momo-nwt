<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MOMO 訂單助手 (資料列複製版)</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f1f5f9; padding: 20px; color: #334155; }
        .container { max-width: 1450px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 5px solid #2563eb; position: relative; overflow: hidden; }
        .card.step2 { border-top-color: #059669; }
        h2 { margin-top: 0; color: #1e293b; font-size: 18px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .info-box { background: #eff6ff; padding: 10px; border-radius: 6px; font-size: 13px; color: #1e40af; margin-bottom: 15px; border: 1px solid #dbeafe; }
        
        #ht_wrapper { width: 100%; height: 350px; overflow: hidden; border: 1px solid #cbd5e1; border-radius: 6px; }
        
        .table-container { overflow: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 10px; max-height: 500px; background: #fff; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        th { background: #f8fafc; padding: 10px; border-bottom: 2px solid #e2e8f0; text-align: left; position: sticky; top: 0; z-index: 5; white-space: nowrap; }
        td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .highlight { background-color: #fef08a !important; font-weight: bold; color: #854d0e; }

        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; margin-right: 10px; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: #059669; color: white; }
        .btn-copy-all { background: #7c3aed; color: white; }
        .clear-btn { position: absolute; top: 20px; right: 25px; background: #ef4444; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; z-index: 10; }

        .preview-header { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
        .count-badge { color: white; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .blue { background: #2563eb; } .green { background: #059669; } .orange { background: #f97316; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card">
        <h2>第一階段：網頁格子貼上資料</h2>
        <button class="clear-btn" onclick="location.reload()">清除重整</button>
        <div class="info-box">教學：全選複製原始 Excel，貼入下方格子。</div>
        <div id="ht_wrapper"><div id="ht_container"></div></div>
        <button class="btn btn-blue" onclick="processS1()">1. 解析並產出排序清單</button>

        <div id="s1_preview" style="display:none;">
            <div class="preview-header">
                <h3>✅ 待出貨 9 項清單 (已排序)</h3>
                <span id="s1_count" class="count-badge blue">0 筆</span>
            </div>
            <div class="table-container"><table id="s1_table"><thead><tr id="s1_h"></tr></thead><tbody id="s1_b"></tbody></table></div>
            <button class="btn btn-blue" onclick="exportS1()">下載 9 項清單 Excel</button>
        </div>
    </div>

    <div class="card step2">
        <h2>最終回填區域 (不含標題，僅複製資料值)</h2>
        <div class="info-box">複製後，請點擊 Excel **第一筆資料的第一格**（排除標題）按 Ctrl+V 貼上。</div>
        <input type="file" id="track_file" accept=".xlsx" style="margin-bottom:10px;">
        <button class="btn btn-green" id="run_btn" onclick="generateFinalTable()" disabled>2. 開始比對並標註變動</button>
        <button class="btn btn-copy-all" id="copy_all_btn" onclick="copyDataOnly()" style="display:none;">📋 一鍵複製全資料值 (排除標題)</button>

        <div id="s2_preview" style="display:none; margin-top:20px;">
            <div class="table-container">
                <table id="final_table"><thead id="final_h"></thead><tbody id="final_b"></tbody></table>
            </div>
        </div>
    </div>

</div>

<script>
    const T9 = ["項次+燈號", "訂單編號", "收件人姓名", "收件人電話", "收件人地址", "品號", "品名", "單品詳細", "數量"];
    let hot, rawHeaders = [], rawRows = [], trackMap = new Map();

    hot = new Handsontable(document.getElementById('ht_container'), {
        data: [Array(30).fill("")], rowHeaders: true, colHeaders: true, minCols: 30, minRows: 50, contextMenu: true, stretchH: 'all', licenseKey: 'non-commercial-and-evaluation'
    });

    function getIdx(headers, name) {
        return headers.findIndex(h => h.replace(/[\s\r\n\(\)（）]+/g, '').includes(name.replace(/\s+/g, '')));
    }

    function processS1() {
        const data = hot.getData();
        rawHeaders = data[0].map(h => String(h || "").trim());
        rawRows = data.slice(1).filter(r => r.some(c => c !== "" && c !== null));
        if (rawHeaders.length < 5) return alert("請確認是否已貼入資料含標題");

        const catIdx = getIdx(rawHeaders, "訂單類別");
        let v = rawRows.filter(r => String(r[catIdx] || "").includes("一般")).map(r => {
            let o = {}; T9.forEach(h => o[h] = r[getIdx(rawHeaders, h)] || ""); return o;
        });

        v.sort((a,b) => {
            if (a["品名"] > b["品名"]) return -1; if (a["品名"] < b["品名"]) return 1;
            if (a["單品詳細"] < b["單品詳細"]) return -1; if (a["單品詳細"] > b["單品詳細"]) return 1;
            return 0;
        });

        document.getElementById('s1_count').innerText = `${v.length} 筆`;
        document.getElementById('s1_h').innerHTML = T9.map(h=>`<th>${h}</th>`).join('');
        document.getElementById('s1_b').innerHTML = v.map(r => `<tr>${T9.map(h=>`<td>${r[h]}</td>`).join('')}</tr>`).join('');
        document.getElementById('s1_preview').style.display = 'block';
        document.getElementById('run_btn').disabled = false;
        alert("解析完成！");
    }

    function exportS1() {
        const ws = XLSX.utils.json_to_sheet(rawRows.filter(r => String(r[getIdx(rawHeaders, "訂單類別")] || "").includes("一般")).map(r => {
            let o = {}; T9.forEach(h => o[h] = r[getIdx(rawHeaders, h)] || ""); return o;
        }).sort((a,b)=>{
            if (a["品名"] > b["品名"]) return -1; if (a["品名"] < b["品名"]) return 1;
            return a["單品詳細"] < b["單品詳細"] ? -1 : 1;
        }));
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "待出貨");
        XLSX.writeFile(wb, "MOMO待出貨清單.xlsx");
    }

    document.getElementById('track_file').onchange = async (e) => {
        const ab = await e.target.files[0].arrayBuffer();
        const wb = XLSX.read(ab, { type: 'array' });
        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
        trackMap.clear();
        json.forEach(row => {
            const ok = row[Object.keys(row).find(k=>k.includes("訂單編號")||k.includes("訂單號碼"))];
            const tk = row[Object.keys(row).find(k=>k.includes("十碼貨號")||k.includes("貨號"))];
            if(ok && tk) trackMap.set(String(ok).trim().substring(0, 18), String(tk).trim());
        });
    };

    function generateFinalTable() {
        const body = document.getElementById('final_b');
        document.getElementById('final_h').innerHTML = `<tr>${rawHeaders.map(h=>`<th>${h}</th>`).join('')}</tr>`;
        body.innerHTML = "";

        const idx = {
            id: getIdx(rawHeaders, "訂單編號"),
            cat: getIdx(rawHeaders, "訂單類別"),
            track: getIdx(rawHeaders, "配送單號"),
            courier: getIdx(rawHeaders, "物流公司"),
            status: getIdx(rawHeaders, "配送狀態"),
            msg: getIdx(rawHeaders, "配送訊息"),
            pkg: getIdx(rawHeaders, "出貨包材")
        };

        rawRows.forEach(row => {
            let newRow = [...row];
            let changed = new Set();
            const id18 = String(newRow[idx.id] || "").trim().substring(0, 18);
            const cat = String(newRow[idx.cat] || "");

            if (cat.includes("交換")) {
                newRow[idx.status] = "自行備註，不須momo協助"; changed.add(idx.status);
                newRow[idx.msg] = "最晚明日回覆"; changed.add(idx.msg);
                if (id18 && trackMap.has(id18)) { newRow[idx.track] = trackMap.get(id18); changed.add(idx.track); }
            } else if (id18 && trackMap.has(id18)) {
                newRow[idx.track] = trackMap.get(id18); changed.add(idx.track);
                newRow[idx.courier] = "新竹貨運"; changed.add(idx.courier);
                newRow[idx.status] = "已配送"; changed.add(idx.status);
                newRow[idx.pkg] = "原箱"; changed.add(idx.pkg);
            }

            const tr = document.createElement('tr');
            newRow.forEach((cell, i) => {
                const td = document.createElement('td');
                td.innerText = cell;
                if (changed.has(i)) td.className = "highlight";
                tr.appendChild(td);
            });
            body.appendChild(tr);
        });

        document.getElementById('s2_preview').style.display = 'block';
        document.getElementById('copy_all_btn').style.display = 'inline-block';
    }

    // 🔴 修改點：只複製資料行 (從 tbody 抓)
    function copyDataOnly() {
        const body = document.getElementById('final_b');
        let text = "";
        const rows = Array.from(body.querySelectorAll('tr'));
        
        rows.forEach(tr => {
            const cells = Array.from(tr.querySelectorAll('td')).map(td => td.innerText);
            text += cells.join('\t') + '\n';
        });

        if (!text) return alert("沒有資料可以複製！");

        navigator.clipboard.writeText(text).then(() => {
            alert("✅ 全資料值已複製 (排除標題)！\n請回到 Excel，點擊第一筆資料的左上角第一格貼上。");
        });
    }
</script>
</body>
</html>
